<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>MUS</title>
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <main class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-top">
                <h1>MUS</h1>
                <p data-i18n="app_subtitle">Compteur de points</p>
                <div class="lang-switcher">
                    <button id="langEu">EU</button>
                    <button id="langFr">FR</button>
                </div>
            </div>
        </header>

        <!-- RESET -->
        <div class="global-actions">
            <button id="resetAll" class="reset-global-btn" data-i18n="new_round"></button>
        </div>

        <!-- TEAMS -->
        <section class="teams">

            <!-- TEAM 1 -->
            <article class="team-card team-card-red">
                <div class="team-header">
                    <input class="team-name-input" id="teamName1" type="text" maxlength="20"
                        data-i18n-placeholder="team1_default" data-i18n-aria="team1_name_aria" />
                </div>
                <div class="score-block">
                    <h3>Hamarreko</h3>
                    <div class="dots" id="hamarrekoDotsTeam1"></div>

                    <h3>Ttantto</h3>
                    <div class="dots" id="ttanttoDotsTeam1"></div>
                </div>

                <div class="actions">
                    <button class="icon-btn" data-action="minus" data-team="team1"
                        data-i18n-aria="minus_team1_aria">-</button>
                    <button class="icon-btn primary" data-action="plus" data-team="team1"
                        data-i18n-aria="plus_team1_aria">+</button>
                </div>
            </article>

            <!-- TEAM 2 -->
            <article class="team-card team-card-green">
                <div class="team-header">
                    <input class="team-name-input" id="teamName2" type="text" maxlength="20"
                        data-i18n-placeholder="team2_default" data-i18n-aria="team2_name_aria" />
                </div>
                <div class="score-block">
                    <h3>Hamarreko</h3>
                    <div class="dots" id="hamarrekoDotsTeam2"></div>

                    <h3>Ttantto</h3>
                    <div class="dots" id="ttanttoDotsTeam2"></div>
                </div>

                <div class="actions">
                    <button class="icon-btn" data-action="minus" data-team="team2"
                        data-i18n-aria="minus_team2_aria">-</button>
                    <button class="icon-btn primary" data-action="plus" data-team="team2"
                        data-i18n-aria="plus_team2_aria">+</button>
                </div>
            </article>
        </section>
    </main>

    <!-- WINNER -->
    <div id="winnerOverlay" class="winner-overlay hidden" aria-live="polite">
        <div class="winner-card">
            <h2 id="winnerMessage"></h2>
            <button id="closeWinner" data-i18n="continue"></button>
        </div>
        <div id="confettiContainer"></div>
    </div>
</body>

</html>
