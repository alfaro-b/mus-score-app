<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUS</title>
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <main class="app">
        <header class="header">
            <h1>MUS</h1>
            <p data-i18n="app_subtitle">Compteur de points</p>
            <div class="lang-switcher">
                <button id="langEu">EU</button>
                <button id="langFr">FR</button>
            </div>
        </header>

        <div class="global-actions">
            <button id="resetAll" class="reset-global-btn" data-i18n="new_round">
                Nouvelle manche
            </button>
        </div>

        <section class="teams">
            <article class="team-card team-card-red">
                <input class="team-name-input" id="teamName1" type="text" maxlength="20"
                    data-i18n-placeholder="team1_default" data-i18n-aria="team1_name_aria" />

                <div class="team-card-body">
                    <section class="score-block">
                        <h3>Hamarreko</h3>
                        <div class="dots dots-hamarreko" id="hamarrekoDotsTeam1"></div>

                        <h3>Ttantto</h3>
                        <div class="dots dots-ttantto" id="ttanttoDotsTeam1"></div>
                    </section>

                    <div class="actions">
                        <button class="icon-btn" data-action="minus" data-team="team1"
                            data-i18n-aria="minus_team1_aria">-</button>
                        <button class="icon-btn" data-action="plus" data-team="team1"
                            data-i18n-aria="plus_team1_aria">+</button>
                    </div>
                </div>
            </article>

            <article class="team-card team-card-green">
                <input class="team-name-input" id="teamName2" type="text" maxlength="20"
                    data-i18n-placeholder="team2_default" data-i18n-aria="team2_name_aria" />

                <div class="team-card-body">
                    <section class="score-block">
                        <h3>Hamarreko</h3>
                        <div class="dots dots-hamarreko" id="hamarrekoDotsTeam2"></div>

                        <h3>Ttantto</h3>
                        <div class="dots dots-ttantto" id="ttanttoDotsTeam2"></div>
                    </section>

                    <div class="actions">
                        <button class="icon-btn" data-action="minus" data-team="team2"
                            data-i18n-aria="minus_team2_aria">-</button>
                        <button class="icon-btn" data-action="plus" data-team="team2"
                            data-i18n-aria="plus_team1_aria">+</button>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <div id="winnerOverlay" class="winner-overlay hidden" aria-live="polite">
        <div class="winner-card">
            <h2 id="winnerMessage">Bravo !</h2>
            <button id="closeWinner" class="close-winner-btn" data-i18n="continue">Continuer</button>
        </div>
        <div id="confettiContainer" class="confetti-container"></div>
    </div>
</body>

</html>
